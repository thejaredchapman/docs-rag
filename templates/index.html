<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ask the Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <main>
    <h1>Ask the Docs</h1>
    <form id="ask-form">
      <input id="question" type="text" placeholder="How do I configure X?" autocomplete="off" required>
      <button type="submit">Ask</button>
    </form>
    <p id="status"></p>
    <article id="answer"></article>
    <ul id="sources"></ul>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.5/purify.min.js"></script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
